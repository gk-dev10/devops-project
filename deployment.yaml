apiVersion: apps/v1
kind: Deployment

metadata:
  name: nexora-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: nexora

  template:
    metadata:
      labels:
        app: nexora

    spec:
      containers:
      - name: nexora
        image: nexora-website
        imagePullPolicy: Never
        ports:
        - containerPort: 80