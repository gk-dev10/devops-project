apiVersion: apps/v1
kind: Deployment

metadata:
  name: devops-project-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: devops-project

  template:
    metadata:
      labels:
        app: devops-project

    spec:
      containers:
      - name: devops-project
        image: gkdev07/devops-project:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80